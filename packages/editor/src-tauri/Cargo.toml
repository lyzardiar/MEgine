[package]
name = "mengine-editor-tauri"
version = "0.1.0"
description = "Tauri shell for MEngine Editor"
edition = "2021"

[lib]
name = "mengine_editor_tauri_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
parking_lot = "0.12"
mengine-editor-host = { path = "../../../crates/mengine-editor-host" }
mengine-core = { path = "../../../crates/mengine-core" }
mengine-assets = { path = "../../../crates/mengine-assets" }
mengine-rhi = { path = "../../../crates/mengine-rhi" }
log = "0.4"
sha2.workspace = true
# AgentBridge local WebSocket transport (AI-agent integration)
tokio = { version = "1", features = ["net", "rt-multi-thread", "macros", "sync", "io-util", "time"] }
tokio-tungstenite = "0.24"
futures-util = "0.3"
uuid = { version = "1", features = ["v4"] }
# Full-window screenshot (Windows GDI) for the AI agent
png = "0.17"
base64 = "0.22"

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.61", features = [
    "Win32_Storage_FileSystem",
    "Win32_UI_Input_KeyboardAndMouse",
    "Win32_Graphics_Gdi",
    "Win32_Foundation",
    "Win32_UI_WindowsAndMessaging",
] }
